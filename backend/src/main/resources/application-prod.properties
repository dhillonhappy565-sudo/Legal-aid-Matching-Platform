# ===============================
# Application
# ===============================
spring.application.name=backend
server.port=8080

# ===============================
# PostgreSQL - PRODUCTION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/legalaid_db
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.username=${postgres}
spring.datasource.password=${happy}

jwt.secret=${ThisIsASecretKeyForLegalAidPlatform123456}


# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===============================
# Flyway (ENABLED in PROD)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===============================
# JWT (MOVE TO ENV VARIABLES LATER)
# ===============================
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
